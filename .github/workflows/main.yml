name: Main

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  checks: write

jobs:
  swift-test:
    name: swift-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run unit tests (capture log)
        run: |
          set -o pipefail
          swift test 2>&1 | tee /tmp/swift-test.log

      - name: Convert unit test output to JUnit
        if: always()
        run: |
          ./scripts/swift-test-to-junit.py /tmp/swift-test.log /tmp/swift-test.junit.xml

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Swift Unit Tests
          path: /tmp/swift-test.junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Run acceptance smoke tests (capture log)
        run: |
          set -o pipefail
          ./scripts/acceptance-tests.sh 2>&1 | tee /tmp/acceptance.log

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Tests (main)";
            echo "";
            echo "- Unit: swift test";
            echo "- Acceptance: scripts/acceptance-tests.sh";
            echo "";
            echo "### Unit tests executed";
            grep -E '^◇ Test ' /tmp/swift-test.log | sed -E 's/^◇ Test (.*) started\.$/- \1/' || true;
            echo "";
            echo "### Acceptance checks";
            grep -E '^\[acceptance\] ok:' /tmp/acceptance.log | sed -E 's/^\[acceptance\] ok: /- ✅ /' || true;
          } >> "$GITHUB_STEP_SUMMARY"
